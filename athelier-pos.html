<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2d4a">
<title>Athelier — Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2d4a;
    --navy-light: #e6edf5;
    --navy-mid: #4d7aab;
    --cream: #f5f7fa;
    --cream-dark: #eaeff5;
    --text: #0f1e30;
    --text-muted: #6b85a0;
    --border: #c8d8e8;
    --white: #ffffff;
    --success: #2d6a4f;
    --danger: #c0392b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  .header {
    background: var(--navy);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
  }

  .logo-wordmark span {
    font-style: italic;
    font-weight: 400;
    color: #8ab4d8;
  }

  .header-sub {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .tabs {
    display: flex;
    background: var(--navy);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 20px;
  }

  .tab-btn {
    padding: 12px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: #8ab4d8;
    border-bottom-color: #8ab4d8;
    font-weight: 500;
  }

  .content { padding: 0; }
  .section { display: none; }
  .section.visible { display: block; }

  .venta-layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: calc(100vh - 110px);
  }

  @media (max-width: 700px) {
    .venta-layout { grid-template-columns: 1fr; }
    .cart-panel { border-left: none; border-top: 1px solid var(--border); }
  }

  .prod-panel {
    padding: 20px;
    background: var(--cream);
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .size-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .size-pill {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    background: var(--white);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .size-pill.active {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  .prod-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .prod-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .prod-card:hover { border-color: var(--navy-mid); box-shadow: 0 2px 12px rgba(26,45,74,0.10); }
  .prod-card:active { transform: scale(0.98); }
  .prod-card.disabled { opacity: 0.35; pointer-events: none; filter: grayscale(0.6); }
  .prod-card.in-cart { border-color: var(--navy-mid); background: var(--navy-light); }
  .prod-card.in-cart .prod-sabor { color: var(--navy); }

  .cart-badge {
    position: absolute; top: -8px; right: -8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--navy); color: var(--white);
    font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(26,45,74,0.3);
  }

  .prod-sabor {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .prod-size {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .prod-price {
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
  }

  .prod-stock {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .cart-panel {
    background: var(--white);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 110px);
    position: sticky;
    top: 110px;
  }

  @media (max-width: 700px) {
    .cart-panel { height: auto; position: static; }
  }

  .cart-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cart-items { flex: 1; overflow-y: auto; padding: 8px 0; }

  .cart-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--cream-dark);
  }

  .ci-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; }
  .ci-size { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); transition: all 0.1s;
  }
  .qty-btn:hover { border-color: var(--navy); color: var(--navy); }
  .qty-val { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }
  .ci-price { font-size: 14px; font-weight: 500; text-align: right; min-width: 72px; }

  .cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }

  .total-row { display: flex; justify-content: space-between; align-items: baseline; }
  .total-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
  .total-val { font-size: 24px; font-weight: 500; color: var(--text); }

  .divider { border: none; border-top: 1px solid var(--border); }

  .pay-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }

  .pay-opt {
    padding: 7px 4px; font-size: 12px;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.5px;
    text-align: center; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    color: var(--text-muted); background: var(--cream);
    transition: all 0.15s;
  }
  .pay-opt.selected { background: var(--navy-light); color: var(--navy); border-color: var(--navy-mid); font-weight: 500; }

  .cash-input-wrap { display: flex; align-items: center; gap: 10px; }
  .cash-prefix { font-size: 14px; color: var(--text-muted); }
  .cash-input {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 16px;
    padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--cream); color: var(--text); outline: none;
  }
  .cash-input:focus { border-color: var(--navy-mid); }

  .change-box {
    background: var(--navy-light); border-radius: 8px;
    padding: 10px 14px; display: flex;
    justify-content: space-between; align-items: center;
  }
  .change-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--navy); }
  .change-val { font-size: 20px; font-weight: 500; color: var(--navy); }
  .change-val.negative { color: var(--danger); }

  .btn-checkout {
    width: 100%; padding: 13px; background: var(--navy);
    color: var(--white); border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-checkout:hover { opacity: 0.88; }
  .btn-checkout:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-cart { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
  .empty-cart .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

  /* INVENTARIO */
  .inv-section { padding: 24px 20px; max-width: 900px; }

  .add-form {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 24px;
  }

  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text);
  }

  .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; align-items: end; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }

  .field label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--cream); color: var(--text); outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--navy-mid); }

  .btn-add {
    padding: 9px 20px; background: var(--navy); color: var(--white);
    border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 1px; cursor: pointer;
    white-space: nowrap; transition: opacity 0.2s; height: 38px;
  }
  .btn-add:hover { opacity: 0.88; }

  .inv-table { width: 100%; border-collapse: collapse; }
  .inv-table th {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 400; padding: 10px 12px;
    text-align: left; border-bottom: 1px solid var(--border); background: var(--cream);
  }
  .inv-table td { padding: 12px; border-bottom: 1px solid var(--cream-dark); font-size: 14px; }
  .inv-table tr:last-child td { border: none; }
  .inv-table tbody tr:hover td { background: var(--cream); }

  .sabor-cell { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; }
  .size-badge {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 99px;
    background: var(--navy-light); color: var(--navy);
  }

  .btn-del {
    padding: 4px 12px; font-size: 12px; border: 1px solid var(--border);
    border-radius: 6px; background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); background: #fff0ee; }

  .btn-edit {
    padding: 4px 12px; font-size: 12px; border: 1px solid var(--border);
    border-radius: 6px; background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-right: 6px;
  }
  .btn-edit:hover { border-color: var(--navy-mid); color: var(--navy); background: var(--navy-light); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,30,48,0.55);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 14px; padding: 28px;
    width: 90%; max-width: 400px; box-shadow: 0 8px 40px rgba(26,45,74,0.20);
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif; font-size: 20px;
    font-weight: 600; color: var(--text); margin-bottom: 20px;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); display: block; margin-bottom: 6px;
  }
  .modal-field input, .modal-field select {
    width: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px;
    padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--cream); color: var(--text); outline: none;
  }
  .modal-field input:focus { border-color: var(--navy-mid); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-modal-cancel {
    flex: 1; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text-muted); cursor: pointer;
  }
  .btn-modal-save {
    flex: 2; padding: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 1px;
    border: none; border-radius: 8px; background: var(--navy); color: var(--white); cursor: pointer;
  }
  .btn-modal-save:hover { opacity: 0.88; }

  /* HISTORIAL */
  .hist-section { padding: 24px 20px; max-width: 700px; }

  .hist-item {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 10px;
  }
  .hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .hist-date { font-size: 12px; color: var(--text-muted); }
  .hist-total { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--navy); }
  .hist-pay-badge {
    display: inline-block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 99px;
    background: var(--navy-light); color: var(--navy); margin-bottom: 8px;
  }
  .hist-items { font-size: 13px; color: var(--text-muted); }

  .hist-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .hist-date-filter {
    font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 12px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--cream); color: var(--text); outline: none;
  }
  .hist-date-filter:focus { border-color: var(--navy-mid); }
  .btn-clear-hist {
    padding: 7px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .btn-clear-hist:hover { border-color: var(--danger); color: var(--danger); background: #fff0ee; }
  .hist-day-total {
    background: var(--navy-light); border-radius: 8px; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .hist-day-total-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--navy); }
  .hist-day-total-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--navy); }
  .btn-del-sale {
    padding: 3px 10px; font-size: 11px; border: 1px solid var(--border);
    border-radius: 5px; background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap;
  }
  .btn-del-sale:hover { border-color: var(--danger); color: var(--danger); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--navy); color: var(--white);
    padding: 10px 20px; border-radius: 99px;
    font-size: 13px; letter-spacing: 0.5px;
    transition: transform 0.3s ease; z-index: 9999; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wordmark">Ath<span>e</span>lier</div>
  <div class="header-sub">Punto de venta</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('venta')">Venta</button>
  <button class="tab-btn" onclick="switchTab('inventario')">Inventario</button>
  <button class="tab-btn" onclick="switchTab('historial')">Historial</button>
</div>

<div class="content">

  <!-- VENTA -->
  <div id="tab-venta" class="section visible">
    <div class="venta-layout">
      <div class="prod-panel">
        <p class="panel-title">Selecciona productos</p>
        <div class="size-filter" id="cat-filter"></div>
        <div class="prod-grid" id="prod-grid"></div>
      </div>

      <div class="cart-panel">
        <div class="cart-header">
          <p class="panel-title" style="margin:0">Carrito</p>
          <button onclick="clearCart()" style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);background:none;border:none;cursor:pointer;">Limpiar</button>
        </div>

        <div class="cart-items" id="cart-list">
          <div class="empty-cart">
            <div class="icon">○</div>
            Selecciona productos<br>para comenzar
          </div>
        </div>

        <div class="cart-footer">
          <div class="total-row">
            <span class="total-label">Total</span>
            <span class="total-val" id="total">$0</span>
          </div>

          <hr class="divider">

          <div>
            <p class="pay-label">Forma de pago</p>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
              <div class="pay-opt selected" onclick="setPay('Efectivo')">Efectivo</div>
              <div class="pay-opt" onclick="setPay('Tarjeta')">Tarjeta</div>
              <div class="pay-opt" onclick="setPay('Transferencia')">Transferencia</div>
            </div>
          </div>

          <div id="cash-section">
            <p class="pay-label">Pago recibido</p>
            <div class="cash-input-wrap">
              <span class="cash-prefix">$</span>
              <input class="cash-input" type="text" id="cash-input" placeholder="0" oninput="formatCashInput(this)" inputmode="numeric">
            </div>
            <div class="change-box" style="margin-top:8px;">
              <span class="change-label">Cambio</span>
              <span class="change-val" id="change-val">$0</span>
            </div>
          </div>

          <button class="btn-checkout" onclick="checkout()" id="btn-checkout" disabled>Registrar venta</button>
        </div>
      </div>
    </div>
  </div>

  <!-- INVENTARIO -->
  <div id="tab-inventario" class="section">
    <div class="inv-section">
      <div class="add-form">
        <p class="form-title">Agregar producto</p>
        <div class="form-grid">
          <div class="field"><label>Nombre</label><input type="text" id="new-name" placeholder="Ej: Delantal de perro"></div>
          <div class="field"><label>Categoría</label>
            <select id="new-size">
              <option value="Delantales de perro">Delantales de perro</option>
              <option value="Delantales de gato">Delantales de gato</option>
              <option value="Delantales personalizados">Personalizados</option>
              <option value="Delantales de cocina">Delantales de cocina</option>
              <option value="Delantales de niños">Delantales de niños</option>
              <option value="Colores">Colores</option>
              <option value="Loncheras">Loncheras</option>
              <option value="Cartucheras">Cartucheras</option>
            </select>
          </div>
          <div class="field"><label>Precio ($)</label><input type="number" id="new-price" placeholder="0" min="0"></div>
          <div class="field"><label>Stock</label><input type="number" id="new-stock" placeholder="0" min="0"></div>
        </div>
        <button class="btn-add" onclick="addProduct()" style="margin-top:14px;">+ Agregar</button>
      </div>

      <table class="inv-table">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="inv-body"></tbody>
      </table>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="tab-historial" class="section">
    <div class="hist-section">
      <div class="hist-toolbar">
        <p class="panel-title" style="margin:0;">Ventas registradas</p>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <input type="date" class="hist-date-filter" id="hist-filter" onchange="renderHistory()">
          <select class="hist-date-filter" id="hist-pay-filter" onchange="renderHistory()">
            <option value="">Todas las formas de pago</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Transferencia">Transferencia</option>
          </select>
          <button class="btn-clear-hist" onclick="clearAllHistory()">Borrar todo</button>
        </div>
      </div>
      <div id="hist-day-summary"></div>
      <div id="hist-list"></div>
    </div>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <p class="modal-title">Editar producto</p>
    <div class="modal-field">
      <label>Nombre</label>
      <input type="text" id="edit-name" placeholder="Nombre del producto">
    </div>
    <div class="modal-field">
      <label>Categoría</label>
      <select id="edit-size">
        <option value="Delantales de perro">Delantales de perro</option>
        <option value="Delantales de gato">Delantales de gato</option>
        <option value="Delantales personalizados">Personalizados</option>
        <option value="Delantales de cocina">Delantales de cocina</option>
        <option value="Delantales de niños">Delantales de niños</option>
        <option value="Colores">Colores</option>
        <option value="Loncheras">Loncheras</option>
        <option value="Cartucheras">Cartucheras</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Precio ($)</label>
      <input type="number" id="edit-price" placeholder="0" min="0">
    </div>
    <div class="modal-field">
      <label>Stock (unidades)</label>
      <input type="number" id="edit-stock" placeholder="0" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-save" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CATEGORIES = [
    'Delantales de perro','Delantales de gato','Delantales personalizados',
    'Delantales de cocina','Delantales de niños','Colores','Loncheras','Cartucheras'
  ];

  let products = [
    { id:1, name:'Delantal de perro',        size:'Delantales de perro',       price:0, stock:10 },
    { id:2, name:'Delantal de gato',          size:'Delantales de gato',        price:0, stock:10 },
    { id:3, name:'Delantal personalizado',    size:'Delantales personalizados', price:0, stock:10 },
    { id:4, name:'Delantal de cocina',        size:'Delantales de cocina',      price:0, stock:10 },
    { id:5, name:'Delantal de niños',         size:'Delantales de niños',       price:0, stock:10 },
    { id:6, name:'Color',                     size:'Colores',                   price:0, stock:20 },
    { id:7, name:'Lonchera',                  size:'Loncheras',                 price:0, stock:10 },
    { id:8, name:'Cartuchera',                size:'Cartucheras',               price:0, stock:10 },
  ];

  let cart = {};
  let payMethod = 'Efectivo';
  let sales = [];
  let nextId = 9;
  let catFilter = 'Todos';

  try {
    const saved = localStorage.getItem('athelier_data');
    if (saved) {
      const d = JSON.parse(saved);
      if (d.products) products = d.products;
      if (d.sales) sales = d.sales;
      if (d.nextId) nextId = d.nextId;
    }
  } catch(e) {}

  function save() {
    try { localStorage.setItem('athelier_data', JSON.stringify({ products, sales, nextId })); } catch(e) {}
  }

  function fmt(n) { return '$' + Math.round(n).toLocaleString('es-CO'); }
  function fmtDate(d) {
    return new Date(d).toLocaleString('es-CO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  function switchTab(t) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['venta','inventario','historial'][i]===t));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
    document.getElementById('tab-'+t).classList.add('visible');
    if (t==='inventario') renderInvTable();
    if (t==='historial') renderHistory();
  }

  function buildCatFilter() {
    const all = ['Todos', ...CATEGORIES];
    document.getElementById('cat-filter').innerHTML = all.map(c =>
      `<div class="size-pill ${c===catFilter?'active':''}" onclick="filterCat('${c}')">${c}</div>`
    ).join('');
  }

  function filterCat(c) {
    catFilter = c;
    buildCatFilter();
    renderProducts();
  }

  function renderProducts() {
    const filtered = catFilter === 'Todos' ? products : products.filter(p => p.size === catFilter);
    document.getElementById('prod-grid').innerHTML = filtered.map(p => {
      const qty = cart[p.id] || 0;
      const inCart = qty > 0;
      const disabled = p.stock === 0;
      return `<div class="prod-card ${disabled?'disabled':''} ${inCart?'in-cart':''}" onclick="addToCart(${p.id})">
        ${inCart ? `<div class="cart-badge">${qty}</div>` : ''}
        <div class="prod-sabor">${p.name}</div>
        <div class="prod-size">${p.size}</div>
        <div class="prod-price">${fmt(p.price)}</div>
        <div class="prod-stock">${disabled ? 'Sin stock' : 'Stock: '+p.stock}</div>
      </div>`;
    }).join('');
  }

  function addToCart(id) {
    const p = products.find(x => x.id===id);
    if (!p || p.stock===0) return;
    if (!cart[id]) cart[id] = 0;
    if (cart[id] >= p.stock) { toast('Stock máximo alcanzado'); return; }
    cart[id]++;
    renderCart();
  }

  function changeQty(id, delta) {
    const p = products.find(x => x.id==id);
    if (delta > 0 && cart[id] >= p.stock) { toast('Stock máximo alcanzado'); return; }
    cart[id] = (cart[id]||0) + delta;
    if (cart[id] <= 0) delete cart[id];
    renderCart();
  }

  function clearCart() {
    cart = {};
    document.getElementById('cash-input').value = '';
    renderCart();
  }

  function renderCart() {
    const keys = Object.keys(cart);
    const list = document.getElementById('cart-list');
    if (!keys.length) {
      list.innerHTML = `<div class="empty-cart"><div class="icon">○</div>Selecciona productos<br>para comenzar</div>`;
      updateTotals();
      renderProducts();
      return;
    }
    list.innerHTML = keys.map(id => {
      const p = products.find(x => x.id==id);
      return `<div class="cart-item">
        <div class="ci-info">
          <div class="ci-name">${p.name}</div>
          <div class="ci-size">${p.size}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-val">${cart[id]}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
        </div>
        <div class="ci-price">${fmt(p.price * cart[id])}</div>
      </div>`;
    }).join('');
    updateTotals();
    renderProducts();
  }

  function getTotal() {
    return Object.keys(cart).reduce((s,id) => {
      const p = products.find(x => x.id==id);
      return s + (p ? p.price * cart[id] : 0);
    }, 0);
  }

  function updateTotals() {
    const t = getTotal();
    document.getElementById('total').textContent = fmt(t);
    document.getElementById('btn-checkout').disabled = t === 0;
    calcChange();
  }

  function formatCashInput(el) {
    let raw = el.value.replace(/[^0-9]/g, '');
    if (!raw) { el.value = ''; calcChange(); return; }
    el.value = parseInt(raw, 10).toLocaleString('es-CO');
    calcChange();
  }

  function setPay(m) {
    payMethod = m;
    document.querySelectorAll('.pay-opt').forEach(el => el.classList.toggle('selected', el.textContent.trim()===m));
    document.getElementById('cash-section').style.display = m==='Efectivo' ? 'block' : 'none';
  }

  function calcChange() {
    const received = parseFloat((document.getElementById('cash-input').value||'').replace(/\./g,'').replace(',','.'))||0;
    const total = getTotal();
    const change = received - total;
    const el = document.getElementById('change-val');
    el.textContent = fmt(Math.max(0, change));
    el.className = 'change-val' + (change < 0 ? ' negative' : '');
  }

  function checkout() {
    const total = getTotal();
    if (!Object.keys(cart).length) return;
    if (payMethod==='Efectivo') {
      const received = parseFloat((document.getElementById('cash-input').value||'').replace(/\./g,'').replace(',','.'))||0;
      if (received < total) { toast('El pago es menor al total'); return; }
    }
    const items = Object.keys(cart).map(id => {
      const p = products.find(x => x.id==id);
      p.stock -= cart[id];
      return { name: p.name, size: p.size, qty: cart[id], price: p.price };
    });
    sales.unshift({ date: new Date().toISOString(), items, total, pay: payMethod });
    save();
    cart = {};
    document.getElementById('cash-input').value = '';
    renderCart();
    renderProducts();
    toast('Venta registrada ✓');
  }

  function addProduct() {
    const name = document.getElementById('new-name').value.trim();
    const size = document.getElementById('new-size').value;
    const price = parseFloat(document.getElementById('new-price').value);
    const stock = parseInt(document.getElementById('new-stock').value);
    if (!name || isNaN(price) || isNaN(stock)) { toast('Completa todos los campos'); return; }
    products.push({ id: nextId++, name, size, price, stock });
    save();
    document.getElementById('new-name').value = '';
    document.getElementById('new-price').value = '';
    document.getElementById('new-stock').value = '';
    renderInvTable();
    renderProducts();
    buildCatFilter();
    toast('Producto agregado ✓');
  }

  function deleteProduct(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    products = products.filter(p => p.id!==id);
    delete cart[id];
    save();
    renderInvTable();
    renderProducts();
    renderCart();
  }

  function renderInvTable() {
    document.getElementById('inv-body').innerHTML = products.map(p => `
      <tr>
        <td class="sabor-cell">${p.name}</td>
        <td><span class="size-badge">${p.size}</span></td>
        <td>${fmt(p.price)}</td>
        <td>${p.stock}</td>
        <td>
          <button class="btn-edit" onclick="openEdit(${p.id})">Editar</button>
          <button class="btn-del" onclick="deleteProduct(${p.id})">Eliminar</button>
        </td>
      </tr>`).join('');
  }

  let editingId = null;

  function openEdit(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('edit-name').value = p.name;
    document.getElementById('edit-size').value = p.size;
    document.getElementById('edit-price').value = p.price;
    document.getElementById('edit-stock').value = p.stock;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }

  function saveEdit() {
    const p = products.find(x => x.id === editingId);
    if (!p) return;
    const name = document.getElementById('edit-name').value.trim();
    const size = document.getElementById('edit-size').value;
    const price = parseFloat(document.getElementById('edit-price').value);
    const stock = parseInt(document.getElementById('edit-stock').value);
    if (!name || isNaN(price) || isNaN(stock)) { toast('Completa todos los campos'); return; }
    p.name = name; p.size = size; p.price = price; p.stock = stock;
    save();
    closeModal();
    renderInvTable();
    renderProducts();
    toast('Producto actualizado ✓');
  }

  function renderHistory() {
    const listEl = document.getElementById('hist-list');
    const summaryEl = document.getElementById('hist-day-summary');
    const filterVal = document.getElementById('hist-filter').value;
    const payFilter = document.getElementById('hist-pay-filter').value;

    let filtered = sales;
    if (filterVal) filtered = filtered.filter(s => s.date.startsWith(filterVal));
    if (payFilter) filtered = filtered.filter(s => s.pay === payFilter);

    if (!filtered.length) {
      summaryEl.innerHTML = '';
      listEl.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:40px 0;">${(filterVal||payFilter) ? 'Sin ventas con estos filtros' : 'Aún no hay ventas registradas'}</p>`;
      return;
    }

    if (filterVal || payFilter) {
      const dayTotal = filtered.reduce((s, v) => s + v.total, 0);
      const labelParts = [];
      if (filterVal) labelParts.push(filterVal.split('-').reverse().join('/'));
      if (payFilter) labelParts.push(payFilter);
      summaryEl.innerHTML = `<div class="hist-day-total">
        <span class="hist-day-total-label">${filtered.length} venta${filtered.length!==1?'s':''} · ${labelParts.join(' · ')}</span>
        <span class="hist-day-total-val">${fmt(dayTotal)}</span>
      </div>`;
    } else {
      summaryEl.innerHTML = '';
    }

    listEl.innerHTML = filtered.map((s) => {
      const realIdx = sales.indexOf(s);
      return `<div class="hist-item">
        <div class="hist-top">
          <span class="hist-date">${fmtDate(s.date)}</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="hist-total">${fmt(s.total)}</span>
            <button class="btn-del-sale" onclick="deleteSale(${realIdx})">Eliminar</button>
          </div>
        </div>
        <span class="hist-pay-badge">${s.pay}</span>
        <div class="hist-items">${s.items.map(i => `${i.qty}× ${i.name}`).join(' · ')}</div>
      </div>`;
    }).join('');
  }

  function deleteSale(idx) {
    if (!confirm('¿Eliminar esta venta del historial?')) return;
    sales.splice(idx, 1);
    save();
    renderHistory();
    toast('Venta eliminada');
  }

  function clearAllHistory() {
    if (!confirm('¿Borrar todo el historial de ventas?')) return;
    sales = [];
    save();
    renderHistory();
    toast('Historial borrado');
  }

  buildCatFilter();
  renderProducts();
  renderCart();
</script>
</body>
</html>
